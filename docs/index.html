<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🏛 Paralegal Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; color: #333; padding: 20px; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #007bff; }
        .active { font-weight: bold; color: #0056b3; }
        .error { color: red; }
        .success { color: green;}
    </style>
</head>
<body>
  <nav>
      <a href="#/">Home</a>
      <a href="#/dockets">Active Dockets</a>
      <a href="#/signal">Signal Integrity</a>
  </nav>
  <main id="root">
      <h1>🏛 Loading Dashboard...</h1>
  </main>

  <script>
      const loadTelemetry = async () => {
          try {
              const response = await fetch('./telemetry-state.json');
              const data = await response.json();
              render(data);
          } catch (error) {
              document.getElementById('root').innerHTML = '<h2 class="error">Failed to load telemetry data.</h2>';
          }
      };

      const render = (data) => {
          const hash = window.location.hash.slice(1);
          const root = document.getElementById('root');

          if (hash === '/dockets') {
              root.innerHTML = `
                  <h1>Active Dockets</h1>
                  <ul>
                      ${data.activeDockets.map(d => `<li>${d}</li>`).join('')}
                  </ul>
              `;
          } else if (hash === '/signal') {
              root.innerHTML = `
                  <h1>Signal Integrity</h1>
                  <p>Status: <span class="success">${data.phi.status}</span></p>
                  <p>Range: ${data.phi.range}</p>
                  <blockquote>${data.phi.insight}</blockquote>
              `;
          } else {
              root.innerHTML = `
                  <h1>System Dashboard</h1>
                  <p>System is <b>${data.systemState}</b>.</p>
                  <p>Last updated: ${data.timestamp}</p>
                  <h2>Compliance Details</h2>
                  <ul>
                      <li>Foundation: ${data.compliance.foundation}</li>
                      <li>Node Version: ${data.compliance.nodeVersion}</li>
                  </ul>
              `;
          }
      };

      window.addEventListener('hashchange', () => loadTelemetry());
      loadTelemetry();
  </script>
</body>
</html>
